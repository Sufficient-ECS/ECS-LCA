required:
  - value
  - unit
additionalProperties: False
properties:
  value:
    type: number
  unit:
    $ref: ./unit.yaml
  uncertainty:
    required:
      - distribution
    additionalProperties: False
    properties:
      distribution:
        type: string
        enum:
          - normal
          - lognormal
          - triangular
          - uniform
      std:
        type: number
      min:
        type: number
      max:
        type: number
      relative_vals:
        type: boolean
